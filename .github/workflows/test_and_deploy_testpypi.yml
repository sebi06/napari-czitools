name: test_and_deploy_testpypi

on:
    push:
        branches:
            - main
            - npe2
            - work-in-progress
            - work_in_progress
        tags:
            - "testpypi-v*"
    pull_request:
        branches:
            - main
            - npe2
    workflow_dispatch:

jobs:
    test:
        name: ${{ matrix.platform }} py${{ matrix.python-version }}
        runs-on: ${{ matrix.platform }}
        timeout-minutes: 30
        strategy:
            fail-fast: false
            matrix:
                platform: [ubuntu-latest, windows-latest]
                python-version: ["3.13"] # Keeping your focus on 3.13 here

        steps:
            - uses: actions/checkout@v4

            - name: Set up Python ${{ matrix.python-version }}
              uses: actions/setup-python@v5
              with:
                  python-version: ${{ matrix.python-version }}

            # Standard libraries for headless Qt testing on Linux
            - uses: tlambert03/setup-qt-libs@v1

            - name: Install Windows OpenGL
              if: runner.os == 'Windows'
              run: |
                  git clone --depth 1 https://github.com/pyvista/gl-ci-helpers.git
                  powershell gl-ci-helpers/appveyor/install_opengl.ps1

            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  # Ensure pytest-forked is present to support the isolation strategy
                  python -m pip install setuptools tox tox-gh-actions pytest-forked

            - name: Set environment variables
              run: |
                  echo "QT_QPA_PLATFORM=offscreen" >> $GITHUB_ENV
                  # Throttle C++ workers to prevent Linux deadlocks
                  echo "AIOCP_MAX_WORKERS=1" >> $GITHUB_ENV

            - name: Test with tox
              uses: aganders3/headless-gui@v2
              with:
                  run: python -m tox
              env:
                  PLATFORM: ${{ matrix.platform }}
                  AIOCP_MAX_WORKERS: 1

            - name: Coverage
              uses: codecov/codecov-action@v3
              with:
                  token: ${{ secrets.CODECOV_TOKEN }}

    deploy:
        needs: [test]
        runs-on: ubuntu-latest
        # Only deploy if it's a TestPyPI tag
        if: startsWith(github.ref, 'refs/tags/testpypi-v')
        permissions:
            id-token: write # Required for trusted publishing if configured
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0 # Important for setuptools_scm version
