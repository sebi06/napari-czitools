name: test_and_deploy_pypi

on:
    push:
        branches: [main, npe2]
        tags: ["v*"]
    pull_request:
        branches: [main, npe2]
    workflow_dispatch:

jobs:
    test:
        name: ${{ matrix.platform }} py${{ matrix.python-version }}
        runs-on: ${{ matrix.platform }}
        timeout-minutes: 30
        strategy:
            fail-fast: false # Keep other tests running even if one fails
            matrix:
                platform: [ubuntu-latest, windows-latest, macos-latest]
                python-version: ["3.11", "3.12", "3.13"]

        steps:
            - uses: actions/checkout@v6

            - name: Set up Python ${{ matrix.python-version }}
              uses: actions/setup-python@v6
              with:
                  python-version: ${{ matrix.python-version }}

            # Standard Qt libraries for Linux
            - uses: tlambert03/setup-qt-libs@v1

            - name: Install Windows OpenGL
              if: runner.os == 'Windows'
              run: |
                  git clone --depth 1 https://github.com/pyvista/gl-ci-helpers.git
                  powershell gl-ci-helpers/appveyor/install_opengl.ps1

            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  # Added pytest-forked here to ensure it is available for tox
                  python -m pip install setuptools tox tox-gh-actions pytest-forked

            - name: Set environment variables
              run: |
                  echo "QT_QPA_PLATFORM=offscreen" >> $GITHUB_ENV
                  # Throttling workers helps prevent deadlocks in CI
                  echo "AIOCP_MAX_WORKERS=1" >> $GITHUB_ENV

            - name: Test with tox
              uses: aganders3/headless-gui@v2
              with:
                  run: python -m tox
              env:
                  PLATFORM: ${{ matrix.platform }}
                  # Pass the worker limit to the tox sub-environment
                  AIOCP_MAX_WORKERS: 1

            - name: Coverage
              uses: codecov/codecov-action@v5
              with:
                  token: ${{ secrets.CODECOV_TOKEN }}

    deploy:
        needs: [test]
        runs-on: ubuntu-latest
        if: startsWith(github.ref, 'refs/tags/v') # Cleaner tag check
        steps:
            - uses: actions/checkout@v6
            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                  python-version: "3.11"
            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install -U setuptools setuptools_scm wheel twine build
            - name: Build and publish
              env:
                  TWINE_USERNAME: __token__
                  TWINE_PASSWORD: ${{ secrets.TWINE_API_KEY }}
              run: |
                  python -m build .
                  twine upload dist/*
